<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Приглашение на коробке</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        /* Стили для кнопки запуска */
        #ar-button {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            padding: 15px 30px;
            font-size: 18px;
            font-family: sans-serif;
            background-color: #000;
            color: #fff;
            border: 2px solid #fff;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <button id="ar-button">ОЖИВИТЬ КОРОБКУ</button>

    <a-scene 
        embedded 
        arjs='sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;'
        vr-mode-ui="enabled: false">
        
        <a-assets>
            <video 
                id="invitationVideo" 
                src="invitation.mp4" 
                preload="auto" 
                loop="true" 
                crossorigin="anonymous" 
                playsinline 
                webkit-playsinline>
            </video>
        </a-assets>

        <a-marker preset="hiro">
            <a-video 
              src="#invitationVideo" 
              width="4.2" 
              height="3.2" 
              rotation="-90 0 0" 
              position="0 0 0">
            </a-video>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // Скрипт для запуска видео по нажатию на кнопку
        const btn = document.querySelector('#ar-button');
        const video = document.querySelector('#invitationVideo');

        btn.addEventListener('click', () => {
            video.play();
            btn.style.display = 'none'; // Скрываем кнопку после нажатия
        });

        // Дополнительная проверка: если видео уже играет (напр. автоплей), скрыть кнопку
        video.addEventListener('playing', () => {
            btn.style.display = 'none';
        });
    </script>
</body>
</html>
